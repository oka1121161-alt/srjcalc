<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Калькулятор растаможки РБ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#070707;
      --card:#101010;
      --input:#171717;
      --border:rgba(255,255,255,0.07);
      --border-hover:rgba(255,255,255,0.14);
      --text:#ffffff;
      --muted:#8d8d8d;
      --accent:#2d6cff;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top,#1a1a1a 0%,#070707 55%);
      font-family:'Inter',sans-serif;
      color:var(--text);
      padding:40px 20px;
    }

    .wrapper{
      max-width:1280px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 420px;
      gap:24px;
      align-items:start;
    }

    .calculator,
    .result-card{
      background:rgba(16,16,16,0.96);
      border:1px solid var(--border);
      border-radius:30px;
      backdrop-filter:blur(18px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 25px 80px rgba(0,0,0,0.55);
    }

    .calculator{
      padding:34px;
    }

    .result-card{
      padding:30px;
      position:sticky;
      top:30px;
    }

    .title{
      font-size:34px;
      font-weight:800;
      letter-spacing:-1.5px;
      margin-bottom:8px;
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      margin-bottom:34px;
    }

    .field{
      margin-bottom:24px;
    }

    .label{
      display:block;
      margin-bottom:12px;
      font-size:14px;
      font-weight:600;
      color:#c2c2c2;
    }

    .input-wrap{
      position:relative;
    }

    input[type="number"]{
      width:100%;
      height:60px;
      background:var(--input);
      border:1px solid var(--border);
      border-radius:18px;
      padding:0 18px;
      color:#fff;
      font-size:16px;
      font-weight:500;
      font-family:'Inter',sans-serif;
      outline:none;
      appearance:textfield;
      -moz-appearance:textfield;
      transition:0.25s ease;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button{
      -webkit-appearance:none;
      margin:0;
    }

    input[type="number"]:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(45,108,255,0.12);
    }

    input[type="number"]::placeholder{
      color:#5f5f5f;
    }

    .currency{
      position:absolute;
      right:18px;
      top:50%;
      transform:translateY(-50%);
      color:#7d7d7d;
      font-weight:700;
      pointer-events:none;
    }

    .select-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .option input{
      display:none;
    }

    .option label{
      min-height:58px;
      background:var(--input);
      border:1px solid var(--border);
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:14px;
      cursor:pointer;
      transition:0.25s ease;
      color:#9d9d9d;
      font-size:14px;
      line-height:1.25;
      font-weight:600;
    }

    .option label:hover{
      border-color:var(--border-hover);
      color:#fff;
    }

    .option input:checked + label{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
      box-shadow:0 12px 28px rgba(45,108,255,0.25);
    }

    .checkbox-block{
      display:none;
      margin-bottom:24px;
    }

    .checkbox{
      display:flex;
      align-items:center;
      gap:14px;
      background:var(--input);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      cursor:pointer;
    }

    .checkbox input{
      display:none;
    }

    .checkmark{
      width:22px;
      height:22px;
      border-radius:7px;
      border:1px solid rgba(255,255,255,0.18);
      background:#111;
      position:relative;
      flex-shrink:0;
    }

    .checkmark::after{
      content:'';
      position:absolute;
      width:6px;
      height:11px;
      border-right:2px solid #fff;
      border-bottom:2px solid #fff;
      transform:rotate(45deg);
      left:7px;
      top:3px;
      opacity:0;
    }

    .checkbox input:checked + .checkmark{
      background:var(--accent);
      border-color:var(--accent);
    }

    .checkbox input:checked + .checkmark::after{
      opacity:1;
    }

    .checkbox-text{
      font-size:15px;
      font-weight:600;
      color:#e8e8e8;
    }

    .hidden{
      display:none;
    }

    .result-title{
      font-size:26px;
      font-weight:800;
      margin-bottom:24px;
    }

    .result-list{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .result-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      background:#171717;
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
    }

    .result-name{
      color:#b8b8b8;
      font-size:14px;
      line-height:1.4;
    }

    .result-value{
      font-size:16px;
      font-weight:700;
      text-align:right;
    }

    .total{
      margin-top:20px;
      padding-top:20px;
      border-top:1px solid rgba(255,255,255,0.07);
    }

    .total .result-item{
      background:#1a1a1a;
      border-color:rgba(45,108,255,0.24);
    }

    .total .result-value{
      font-size:22px;
      line-height:1.5;
    }

    .rate{
      margin-top:18px;
      color:#8d8d8d;
      font-size:13px;
    }

    @media(max-width:1050px){

      .wrapper{
        grid-template-columns:1fr;
      }

      .result-card{
        position:relative;
        top:0;
      }
    }

    @media(max-width:640px){

      .calculator,
      .result-card{
        padding:24px;
        border-radius:24px;
      }

      .title{
        font-size:28px;
      }

      .select-grid{
        grid-template-columns:1fr;
      }
    }

  </style>

</head>
<body>

  <div class="wrapper">

    <div class="calculator">

      <h1 class="title">
        Растаможка РБ
      </h1>

      <p class="subtitle">
        Калькулятор расчета таможенных платежей
      </p>

      <!-- Стоимость -->

      <div class="field">

        <label class="label">
          Стоимость авто
        </label>

        <div class="input-wrap">

          <input
            type="number"
            id="carPrice"
            placeholder="Введите стоимость"
          >

          <span class="currency">
            €
          </span>

        </div>

      </div>

      <!-- Возраст -->

      <div class="field">

        <label class="label">
          Возраст авто
        </label>

        <div class="select-grid">

          <div class="option">

            <input
              type="radio"
              name="age"
              id="newCar"
              value="new"
              checked
            >

            <label for="newCar">
              Новый / до 3 лет
            </label>

          </div>

          <div class="option">

            <input
              type="radio"
              name="age"
              id="middleCar"
              value="middle"
            >

            <label for="middleCar">
              3–5 лет
            </label>

          </div>

          <div class="option">

            <input
              type="radio"
              name="age"
              id="oldCar"
              value="old"
            >

            <label for="oldCar">
              Старше 5 лет
            </label>

          </div>

        </div>

      </div>

      <!-- Тип двигателя -->

      <div class="field">

        <label class="label">
          Тип двигателя
        </label>

        <div class="select-grid">

          <div class="option">

            <input
              type="radio"
              name="engineType"
              id="ice"
              value="ice"
              checked
            >

            <label for="ice">
              ДВС
            </label>

          </div>

          <div class="option">

            <input
              type="radio"
              name="engineType"
              id="electric"
              value="electric"
            >

            <label for="electric">
              Электро
            </label>

          </div>

          <div class="option">

            <input
              type="radio"
              name="engineType"
              id="hybrid"
              value="hybrid"
            >

            <label for="hybrid">
              Последовательный гибрид
            </label>

          </div>

        </div>

      </div>

      <!-- Льгота -->

      <div
        class="checkbox-block"
        id="benefitBlock"
      >

        <label class="checkbox">

          <input
            type="checkbox"
            id="benefitCheckbox"
          >

          <span class="checkmark"></span>

          <span class="checkbox-text">
            Таможенная льгота 50% (Указ №140)
          </span>

        </label>

      </div>

      <!-- Объем двигателя -->

      <div
        class="field hidden"
        id="engineVolumeField"
      >

        <label class="label">
          Объем двигателя (см³)
        </label>

        <div class="input-wrap">

          <input
            type="number"
            id="engineVolume"
            placeholder="Введите объем двигателя"
          >

        </div>

      </div>

    </div>

    <!-- RESULT -->

    <div class="result-card">

      <h2 class="result-title">
        Результат
      </h2>

      <div class="result-list">

        <div class="result-item">

          <span class="result-name">
            Таможенная пошлина
          </span>

          <span
            class="result-value"
            id="dutyValue"
          >
            0 €
          </span>

        </div>

        <div class="result-item">

          <span class="result-name">
            Таможенный сбор
          </span>

          <span class="result-value">
            120 BYN
          </span>

        </div>

        <div class="result-item">

          <span class="result-name">
            Утилизационный сбор
          </span>

          <span
            class="result-value"
            id="utilValue"
          >
            625 BYN
          </span>

        </div>

        <div class="result-item">

          <span class="result-name">
            НДС
          </span>

          <span
            class="result-value"
            id="ndsValue"
          >
            0 €
          </span>

        </div>

        <div class="result-item">

          <span class="result-name">
            Расходы на СВХ
          </span>

          <span class="result-value">
            700 BYN
          </span>

        </div>

      </div>

      <div class="total">

        <div class="result-item">

          <span class="result-name">
            Итого
          </span>

          <span
            class="result-value"
            id="totalValue"
          >
            0 BYN
          </span>

        </div>

      </div>

      <div
        class="rate"
        id="rateInfo"
      >
        Загрузка курса НБРБ...
      </div>

    </div>

  </div>

  <script>

    let EUR_RATE = 0;

    const engineTypeInputs =
      document.querySelectorAll('input[name="engineType"]');

    const ageInputs =
      document.querySelectorAll('input[name="age"]');

    const carPriceInput =
      document.getElementById('carPrice');

    const engineVolumeInput =
      document.getElementById('engineVolume');

    const benefitCheckbox =
      document.getElementById('benefitCheckbox');

    const engineVolumeField =
      document.getElementById('engineVolumeField');

    const benefitBlock =
      document.getElementById('benefitBlock');

    const dutyValue =
      document.getElementById('dutyValue');

    const utilValue =
      document.getElementById('utilValue');

    const ndsValue =
      document.getElementById('ndsValue');

    const totalValue =
      document.getElementById('totalValue');

    const rateInfo =
      document.getElementById('rateInfo');

    // Курс НБРБ

    async function loadCurrencyRate() {

      try {

        const response = await fetch(
          'https://api.nbrb.by/exrates/rates/EUR?parammode=2'
        );

        const data = await response.json();

        EUR_RATE = data.Cur_OfficialRate;

        rateInfo.innerHTML =
          `Курс НБРБ: 1 EUR = ${EUR_RATE.toFixed(4)} BYN`;

        calculateResult();

      } catch (error) {

        console.log(error);

        EUR_RATE = 3.35;

        rateInfo.innerHTML =
          'Курс НБРБ временно недоступен';

      }

    }

    // Toggle

    function updateForm() {

      const selectedEngine =
        document.querySelector('input[name="engineType"]:checked').value;

      if (selectedEngine === 'ice') {

        benefitBlock.style.display = 'block';

        engineVolumeField.classList.remove('hidden');

      } else {

        benefitBlock.style.display = 'none';

        engineVolumeField.classList.add('hidden');

        engineVolumeInput.value = '';

        benefitCheckbox.checked = false;

      }

      calculateResult();

    }

    // Пошлина ДВС

    function calculateDuty(price, volume, age) {

      let duty = 0;

      if (age === 'new') {

        if (price <= 8500) {
          duty = Math.max(price * 0.54, volume * 2.5);
        } else if (price <= 16700) {
          duty = Math.max(price * 0.48, volume * 3.5);
        } else if (price <= 42300) {
          duty = Math.max(price * 0.48, volume * 5.5);
        } else if (price <= 84500) {
          duty = Math.max(price * 0.48, volume * 7.5);
        } else if (price <= 169000) {
          duty = Math.max(price * 0.48, volume * 15);
        } else {
          duty = Math.max(price * 0.48, volume * 20);
        }

      }

      if (age === 'middle') {

        if (volume <= 1000) {
          duty = volume * 1.5;
        } else if (volume <= 1500) {
          duty = volume * 1.7;
        } else if (volume <= 1800) {
          duty = volume * 2.5;
        } else if (volume <= 2300) {
          duty = volume * 2.7;
        } else if (volume <= 3000) {
          duty = volume * 3;
        } else {
          duty = volume * 3.6;
        }

      }

      if (age === 'old') {

        if (volume <= 1000) {
          duty = volume * 3;
        } else if (volume <= 1500) {
          duty = volume * 3.2;
        } else if (volume <= 1800) {
          duty = volume * 3.5;
        } else if (volume <= 2300) {
          duty = volume * 4.8;
        } else if (volume <= 3000) {
          duty = volume * 5;
        } else {
          duty = volume * 5.7;
        }

      }

      return duty;

    }

    // Главный расчет

    function calculateResult() {

      const selectedEngine =
        document.querySelector('input[name="engineType"]:checked').value;

      const selectedAge =
        document.querySelector('input[name="age"]:checked').value;

      const carPrice =
        Number(carPriceInput.value) || 0;

      const engineVolume =
        Number(engineVolumeInput.value) || 0;

      const hasBenefit =
        benefitCheckbox.checked;

      // Утиль

      let utilFee = 625;

      if (
        selectedAge === 'middle'
        || selectedAge === 'old'
      ) {

        utilFee = 1282;

      }

      utilValue.textContent =
        `${utilFee.toLocaleString('ru-RU')} BYN`;

      // Пошлина

      let duty = 0;

      // ДВС

      if (selectedEngine === 'ice') {

        duty = calculateDuty(
          carPrice,
          engineVolume,
          selectedAge
        );

        if (hasBenefit) {

          duty = duty / 2;

        }

      }

      // Последовательный гибрид

      if (selectedEngine === 'hybrid') {

        duty = carPrice * 0.15;

      }

      dutyValue.textContent =
        `${Math.round(duty).toLocaleString('ru-RU')} €`;

      // НДС

      let nds = 0;

      if (selectedEngine === 'hybrid') {

        nds = (carPrice + duty) * 0.20;

      }

      ndsValue.textContent =
        `${Math.round(nds).toLocaleString('ru-RU')} €`;

      // Итого

      const euroTotal =
        duty + nds;

      const bynTotal =
        (euroTotal * EUR_RATE)
        + utilFee
        + 120
        + 700;

      totalValue.innerHTML = `
        ${Math.round(bynTotal).toLocaleString('ru-RU')} BYN
      `;

    }

    // Events

    engineTypeInputs.forEach(input => {

      input.addEventListener('change', updateForm);

    });

    ageInputs.forEach(input => {

      input.addEventListener('change', calculateResult);

    });

    benefitCheckbox.addEventListener('change', calculateResult);

    carPriceInput.addEventListener('input', calculateResult);

    engineVolumeInput.addEventListener('input', calculateResult);

    updateForm();

    loadCurrencyRate();

  </script>

</body>
</html>
